[global]
process.max = 128
log_level = warning
daemonize = no

[www]
listen = 0.0.0.0:9000
listen.allowed_clients = 127.0.0.1
pm = dynamic
pm.max_children = 50
pm.start_servers = 10
pm.min_spare_servers = 5
pm.max_spare_servers = 20
pm.max_requests = 500
pm.process_idle_timeout = 10s
pm.status_path = /php-fpm-status

catch_workers_output = yes
decorate_workers_output = no

; Security
chdir = /var/www/html
