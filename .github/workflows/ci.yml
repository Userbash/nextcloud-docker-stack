---
name: Local Checks & Lints

'on':
  push:
    branches: [ "main", "master", "dev" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run ShellCheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck
          WORKSPACE_DIR="${GITHUB_WORKSPACE:-$PWD}"
          cd "$WORKSPACE_DIR"
          # Exclude data and .git to avoid permission noise in local act runs.
          find . -type d \( -name 'data' -o -name '.git' \) -prune -o -type f -name '*.sh' -print0 2>/dev/null | xargs -0 -r shellcheck

      - name: Run yamllint
        run: |
          sudo apt-get update -qq || true
          sudo apt-get install -y yamllint
          WORKSPACE_DIR="${GITHUB_WORKSPACE:-$PWD}"
          cd "$WORKSPACE_DIR"
          bash scripts/validate-yaml.sh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python Linters
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black

      - name: Check Python formatting
        run: |
          WORKSPACE_DIR="${GITHUB_WORKSPACE:-$PWD}"
          cd "$WORKSPACE_DIR"
          find . -type d \( -name '.git' -o -name 'data' \) -prune -o -type f -name '*.py' -print0 2>/dev/null | xargs -0 -r black --check || echo "Black found formatting issues, but continuing..."

      - name: Lint Python with flake8
        run: |
          WORKSPACE_DIR="${GITHUB_WORKSPACE:-$PWD}"
          cd "$WORKSPACE_DIR"
          find . -type d \( -name '.git' -o -name 'data' \) -prune -o -type f -name '*.py' -print0 2>/dev/null | xargs -0 -r flake8 || echo "Flake8 found issues, but continuing..."
